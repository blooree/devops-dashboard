# Production compose — pulls pre-built images from Docker Hub
networks:
  dashboard:
    driver: bridge

volumes:
  dashboard_data:

services:
  backend:
    image: ${DOCKERHUB_USERNAME}/devops-dashboard-backend:${VERSION:-latest}
    restart: unless-stopped
    volumes:
      - dashboard_data:/data
    environment:
      - APP_VERSION=${VERSION:-latest}
      - DATA_DIR=/data
    networks: [dashboard]

  frontend:
    image: ${DOCKERHUB_USERNAME}/devops-dashboard-frontend:${VERSION:-latest}
    restart: unless-stopped
    networks: [dashboard]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks: [dashboard]

  prometheus:
    image: prom/prometheus:v2.48.0
    restart: unless-stopped
    volumes:
      - ./monitoring:/etc/prometheus
    networks: [dashboard]
