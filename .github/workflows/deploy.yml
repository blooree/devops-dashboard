name: Build → Push → Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: docker.io

jobs:
  # ──────────────────────────────────────────────
  # 1. Test
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Smoke-test backend import
        working-directory: backend
        run: python -c "from app import app; print('Backend import OK')"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ──────────────────────────────────────────────
  # 2. Build & Push Docker images
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set VERSION
        id: version
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-dashboard-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-dashboard-backend:${{ steps.version.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-dashboard-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-dashboard-frontend:${{ steps.version.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 3. Deploy to VDS
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build-and-push.outputs.version }}
      DEPLOY_DIR: /opt/devops-dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Record job start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Install SSH client
        run: sudo apt-get install -y openssh-client

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VDS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VDS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy compose files & configs to server
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            ${{ secrets.VDS_USER }}@${{ secrets.VDS_HOST }}:${{ env.DEPLOY_DIR }}/

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r \
            nginx/ monitoring/ \
            ${{ secrets.VDS_USER }}@${{ secrets.VDS_HOST }}:${{ env.DEPLOY_DIR }}/

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VDS_USER }}@${{ secrets.VDS_HOST }} \
            "cd ${{ env.DEPLOY_DIR }} && \
             printf 'VERSION=%s\nDOCKERHUB_USERNAME=%s\n' \
               '${{ env.VERSION }}' \
               '${{ secrets.DOCKERHUB_USERNAME }}' > .env && \
             docker compose -f docker-compose.prod.yml pull && \
             docker compose -f docker-compose.prod.yml up -d --remove-orphans && \
             docker system prune -f"

      - name: Register successful deployment
        if: success()
        run: |
          END=$(date +%s)
          DURATION=$(( END - ${{ steps.timer.outputs.start }} ))
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"commit\":   \"${{ env.VERSION }}\",
              \"message\":  \"${{ github.event.head_commit.message }}\",
              \"author\":   \"${{ github.actor }}\",
              \"status\":   \"success\",
              \"duration_sec\": $DURATION
            }" \
            "http://${{ secrets.VDS_HOST }}/api/deployments/register" || true

      - name: Register failed deployment
        if: failure()
        run: |
          END=$(date +%s)
          DURATION=$(( END - ${{ steps.timer.outputs.start }} ))
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"commit\":   \"${{ env.VERSION }}\",
              \"message\":  \"${{ github.event.head_commit.message }}\",
              \"author\":   \"${{ github.actor }}\",
              \"status\":   \"failed\",
              \"duration_sec\": $DURATION
            }" \
            "http://${{ secrets.VDS_HOST }}/api/deployments/register" || true
