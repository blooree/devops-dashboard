# Local development compose — builds images from source
networks:
  dashboard:
    driver: bridge

volumes:
  dashboard_data:

services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - dashboard_data:/data
    environment:
      - APP_VERSION=dev
      - DATA_DIR=/data
    networks: [dashboard]
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks: [dashboard]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks: [dashboard]

  prometheus:
    image: prom/prometheus:v2.48.0
    restart: unless-stopped
    volumes:
      - ./monitoring:/etc/prometheus
    ports:
      - "9090:9090"
    networks: [dashboard]
